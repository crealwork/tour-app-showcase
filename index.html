<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile App Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f4f1eb;
    color: #3d3d3d;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Header ─── */
  .header {
    text-align: center;
    padding: 48px 24px 24px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #8a9a7b;
  }
  .header h1 br { display: block; }
  @media (min-width: 480px) {
    .header h1 br { display: none; }
    .header h1 { font-size: 28px; }
  }
  .header p {
    margin-top: 8px;
    font-size: 14px;
    color: #9a9590;
  }

  /* ─── Step indicator ─── */
  .step-indicator {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 16px 24px 8px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #d4cfc8;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    padding: 0;
  }
  .dot.active {
    background: #8a9a7b;
    box-shadow: 0 0 10px rgba(138, 154, 123, 0.35);
    transform: scale(1.3);
  }

  /* ─── Screen title ─── */
  .screen-title {
    text-align: center;
    padding: 12px 24px 4px;
    font-size: 18px;
    font-weight: 600;
    min-height: 48px;
    transition: opacity 0.3s ease;
  }
  .screen-subtitle {
    text-align: center;
    font-size: 13px;
    color: #9a9590;
    padding-bottom: 20px;
  }

  /* ─── Phone frame ─── */
  .phone-container {
    display: flex;
    justify-content: center;
    padding: 0 24px;
  }
  .phone-frame {
    position: relative;
    width: 340px;
    max-width: 85vw;
    border-radius: 24px;
    background: #fff;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.04),
      0 20px 50px rgba(0,0,0,0.12),
      0 8px 24px rgba(0,0,0,0.08);
  }

  /* ─── Scroll carousel ─── */
  .carousel {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .carousel::-webkit-scrollbar { display: none; }

  .carousel-slide {
    flex: 0 0 100%;
    scroll-snap-align: center;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .carousel-slide img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ─── Navigation arrows ─── */
  .nav-arrows {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 24px;
  }
  .nav-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #d4cfc8;
    background: #fff;
    color: #9a9590;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .nav-btn:hover {
    border-color: #8a9a7b;
    color: #8a9a7b;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(138, 154, 123, 0.2);
  }
  .nav-btn:active { transform: translateY(0); }
  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
    border-color: #d4cfc8;
    color: #c5c0b9;
  }
  .nav-btn:disabled:hover {
    box-shadow: none;
  }

  /* ─── Keyboard hint ─── */
  .keyboard-hint {
    text-align: center;
    padding: 0 24px 40px;
    font-size: 12px;
    color: #b8b3ac;
  }
  .key {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid #c5c0b9;
    border-radius: 4px;
    font-family: monospace;
    font-size: 11px;
    margin: 0 2px;
  }

  /* ─── Responsive ─── */
  @media (min-width: 768px) {
    .header h1 { font-size: 34px; }
    .phone-frame { width: 380px; border-radius: 28px; }
    .screen-title { font-size: 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .carousel { scroll-behavior: auto; }
    .dot, .nav-btn { transition: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Buyer Tour<br> Scheduling App</h1>
  <p>Swipe or use arrows to browse screens</p>
</div>

<div class="step-indicator" id="dots"></div>

<div class="screen-title" id="screenTitle">Dashboard</div>
<div class="screen-subtitle" id="screenSubtitle">Screen 1 of 7</div>

<div class="phone-container">
  <div class="phone-frame">
    <div class="carousel" id="carousel">
      <div class="carousel-slide"><img src="screen_1.png" alt="Dashboard - Morning Sarah view with scheduled tours" loading="eager"></div>
      <div class="carousel-slide"><img src="screen_2.png" alt="Client Availability Selection with calendar" loading="lazy"></div>
      <div class="carousel-slide"><img src="screen_3.png" alt="Tour Property List with addresses" loading="lazy"></div>
      <div class="carousel-slide"><img src="screen_4.png" alt="Route Optimizer with map view" loading="lazy"></div>
      <div class="carousel-slide"><img src="screen_5.png" alt="AI Concierge Log with confirmations" loading="lazy"></div>
      <div class="carousel-slide"><img src="screen_6.png" alt="Finalize and Send Itinerary" loading="lazy"></div>
      <div class="carousel-slide"><img src="screen_7.png" alt="Active Itinerary - Running Behind view" loading="lazy"></div>
    </div>
  </div>
</div>

<div class="nav-arrows">
  <button class="nav-btn" id="prevBtn" aria-label="Previous screen">&#8592;</button>
  <button class="nav-btn" id="nextBtn" aria-label="Next screen">&#8594;</button>
</div>

<div class="keyboard-hint">
  <span class="key">←</span> <span class="key">→</span> arrow keys &nbsp;·&nbsp; swipe on mobile
</div>

<script>
const screens = [
  { title: 'Dashboard', desc: 'Home screen with scheduled tours overview' },
  { title: 'Client Availability', desc: 'Calendar & time window selection' },
  { title: 'Tour Property List', desc: 'Properties added to the tour' },
  { title: 'Route Optimizer', desc: 'AI-optimized driving route on map' },
  { title: 'AI Concierge Log', desc: 'Automated agent confirmations & conflicts' },
  { title: 'Send Itinerary', desc: 'Final review, calendar sync & client invite' },
  { title: 'Active Itinerary', desc: 'Live tour tracking & schedule adjustments' },
];

const carousel = document.getElementById('carousel');
const dotsContainer = document.getElementById('dots');
const titleEl = document.getElementById('screenTitle');
const subtitleEl = document.getElementById('screenSubtitle');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

let current = 0;
const total = screens.length;

// Build dots
screens.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.setAttribute('aria-label', `Go to screen ${i + 1}`);
  dot.addEventListener('click', () => goTo(i));
  dotsContainer.appendChild(dot);
});

function updateUI(index) {
  current = index;
  titleEl.textContent = screens[index].title;
  subtitleEl.textContent = `Screen ${index + 1} of ${total} — ${screens[index].desc}`;

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === index);
  });

  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === total - 1;
}

function goTo(index) {
  if (index < 0 || index >= total) return;
  const slide = carousel.children[index];
  slide.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// Detect scroll position
let scrollTimeout;
carousel.addEventListener('scroll', () => {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const slideWidth = carousel.offsetWidth;
    const scrollLeft = carousel.scrollLeft;
    const index = Math.round(scrollLeft / slideWidth);
    if (index >= 0 && index < total && index !== current) {
      updateUI(index);
    }
  }, 50);
});

// Arrow buttons
prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goTo(current + 1); }
});

// Init
updateUI(0);
</script>

</body>
</html>
